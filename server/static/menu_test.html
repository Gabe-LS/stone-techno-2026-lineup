<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menu Test</title>
<style>
*, *::before, *::after { box-sizing: border-box; }
body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

/* ===== MOBILE MENU (full rewrite) ===== */

/* Top bar */
.mobile-bar {
  position: sticky;
  top: 0;
  z-index: 50;
  background: #111;
  height: 48px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
}

/* View label — left aligned, large */
.mobile-bar .view-label {
  color: #fff;
  font-size: 16px;
  font-weight: 600;
  letter-spacing: 0.02em;
}

/* Hamburger — right side, big tap target */
.mobile-bar .hamburger {
  display: flex;
  align-items: center;
  justify-content: center;
  background: none;
  border: none;
  color: #fff;
  width: 48px;
  height: 48px;
  margin-right: -12px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.mobile-bar .hamburger svg {
  width: 28px;
  height: 28px;
}

/* Dropdown — full width, matches bar width exactly */
.mobile-dropdown {
  display: none;
  position: fixed;
  top: 48px;
  left: 0;
  right: 0;
  z-index: 49;
  background: #111;
  flex-direction: column;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
}
.mobile-dropdown.open {
  display: flex;
}
.mobile-dropdown button {
  background: none;
  border: none;
  border-top: 1px solid #222;
  color: #aaa;
  cursor: pointer;
  padding: 16px;
  font-size: 16px;
  text-align: left;
  font-family: inherit;
  -webkit-tap-highlight-color: transparent;
}
.mobile-dropdown button:active {
  background: #222;
}
.mobile-dropdown button.active {
  color: #fff;
  font-weight: 600;
}

/* Overlay behind dropdown */
.menu-overlay {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 48;
  background: rgba(0,0,0,0.3);
}
.menu-overlay.open {
  display: block;
}

/* Demo content */
.content { padding: 24px 16px; }
.content h1 { font-size: 1.8em; border-bottom: 2px solid #222; padding-bottom: 8px; }
.content p { color: #555; line-height: 1.6; }
</style>
</head>
<body>

<div class="mobile-bar">
  <span class="view-label" id="view-label">Line-up</span>
  <button class="hamburger" onclick="toggleMenu()" aria-label="Menu">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <line x1="4" y1="6" x2="20" y2="6"/>
      <line x1="4" y1="12" x2="20" y2="12"/>
      <line x1="4" y1="18" x2="20" y2="18"/>
    </svg>
  </button>
</div>

<div class="menu-overlay" id="menu-overlay" onclick="closeMenu()"></div>

<div class="mobile-dropdown" id="mobile-dropdown">
  <button class="active" onclick="pick('Line-up')">Line-up</button>
  <button onclick="pick('Timetable')">Timetable</button>
  <button onclick="pick('Show My Picks')">Show My Picks</button>
  <button onclick="pick('Show My Schedule')">Show My Schedule</button>
  <button onclick="pick('Share')">Share</button>
  <button onclick="pick('Sync')">Sync</button>
</div>

<div class="content">
  <h1>Stone Techno 2026 Line-up</h1>
  <p>Demo content to test the menu.</p>
  <p>Resize to mobile width or open on phone.</p>
  <p style="margin-top:200px">More content below...</p>
  <p style="margin-top:200px">Even more...</p>
</div>

<script>
function toggleMenu() {
  document.getElementById('mobile-dropdown').classList.toggle('open');
  document.getElementById('menu-overlay').classList.toggle('open');
}
function closeMenu() {
  document.getElementById('mobile-dropdown').classList.remove('open');
  document.getElementById('menu-overlay').classList.remove('open');
}
function pick(label) {
  document.getElementById('view-label').textContent = label;
  document.querySelectorAll('.mobile-dropdown button').forEach(b => {
    b.classList.toggle('active', b.textContent === label);
  });
  closeMenu();
}
</script>
</body>
</html>
